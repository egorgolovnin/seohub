<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOhub — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0c0c14;--bg3:#13131e;--border:#1e1e30;--t:#e4e4f0;--t2:#8585a0;--t3:#4a4a64;--acc:#00e6b8;--red:#ff3f5e;--ylw:#ffa630;--grn:#3fcc7f;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:700;margin-bottom:16px}
h1 span{color:var(--acc)}
.login-box{max-width:320px;margin:80px auto;padding:24px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r)}
.login-box h2{font-size:16px;margin-bottom:12px;text-align:center}
.login-box input{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--t);font-family:inherit;margin-bottom:8px;outline:none}
.login-box input:focus{border-color:var(--acc)}
.login-box button{width:100%;padding:10px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-family:inherit;font-weight:700;cursor:pointer}
.login-box .err{color:var(--red);font-size:12px;margin-top:6px;display:none}
.dash{display:none}
.nav{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.nav-btn{padding:10px 20px;background:none;border:none;color:var(--t2);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;border-radius:var(--rs) var(--rs) 0 0}
.nav-btn.on{color:var(--acc);border-bottom:2px solid var(--acc)}
.page{display:none}.page.on{display:block}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);cursor:pointer;font-size:13px;font-weight:500}
.tab.on{background:var(--acc);color:#000;border-color:var(--acc)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.card-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.card-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.card-sub{font-size:11px;color:var(--t2);margin-top:2px}
.grn{color:var(--grn)}.ylw{color:var(--ylw)}.red{color:var(--red)}.acc{color:var(--acc)}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{text-align:left;padding:8px;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px}
.section{margin-bottom:20px}
.section-title{font-size:14px;font-weight:600;margin-bottom:8px}
.btn{padding:6px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--acc);cursor:pointer;font-size:12px;font-family:inherit}
.btn:hover{border-color:var(--acc)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-p{background:var(--acc);color:#000;border-color:var(--acc)}
.btn-d{color:var(--red);border-color:var(--red)}
.btn-d:hover{background:var(--red);color:#fff}
td input{width:70px;padding:4px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--t);font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right}
td input:focus{border-color:var(--acc);outline:none}
td input.geo-input{width:50px;text-align:center;text-transform:uppercase}
.add-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.add-row input{padding:6px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--t);font-family:'JetBrains Mono',monospace;font-size:12px}
.add-row input.geo-add{width:60px;text-transform:uppercase}
.add-row input.num-add{width:80px;text-align:right}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:var(--rs);font-size:13px;display:none;z-index:100}
.toast.ok{background:var(--grn);color:#000}.toast.err{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="login-box" id="loginBox">
  <h2>SEOhub Admin</h2>
  <input type="text" id="loginUser" placeholder="Логин" autocomplete="off">
  <input type="password" id="loginPass" placeholder="Пароль">
  <button onclick="doLogin()">Войти</button>
  <div class="err" id="loginErr">Неверный логин или пароль</div>
</div>

<div class="dash" id="dashboard">
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h1>SEOhub <span>Admin</span></h1>
    </div>

    <div class="nav">
      <button class="nav-btn on" onclick="showPage('analytics',this)">Аналитика</button>
      <button class="nav-btn" onclick="showPage('rates',this)">Ставки CPA</button>
    </div>

    <!-- Analytics Page -->
    <div class="page on" id="pg-analytics">
      <div class="tabs">
        <div class="tab on" onclick="setPeriod(1,this)">Сегодня</div>
        <div class="tab" onclick="setPeriod(7,this)">Неделя</div>
        <div class="tab" onclick="setPeriod(30,this)">Месяц</div>
        <div class="tab" onclick="setPeriod(365,this)">Всё время</div>
      </div>
      <div class="cards" id="cards"></div>
      <div class="section">
        <div class="section-title">По типам событий</div>
        <table><thead><tr><th>Событие</th><th>Количество</th></tr></thead><tbody id="byType"></tbody></table>
      </div>
      <div class="section">
        <div class="section-title">Топ пользователей</div>
        <table><thead><tr><th>Пользователь</th><th>Действий</th></tr></thead><tbody id="topUsers"></tbody></table>
      </div>
      <div class="section">
        <div class="section-title">Последние события</div>
        <table><thead><tr><th>Время</th><th>Тип</th><th>Пользователь</th><th>Детали</th></tr></thead><tbody id="recentEvents"></tbody></table>
      </div>
    </div>

    <!-- Rates Page -->
    <div class="page" id="pg-rates">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin:0">CPA ставки по ГЕО (<span id="ratesCountLabel">0</span>)</div>
        <button class="btn" onclick="loadRates()">Обновить</button>
      </div>
      <table>
        <thead><tr><th>ГЕО</th><th>Мин $</th><th>Средняя $</th><th>Макс $</th><th></th></tr></thead>
        <tbody id="ratesBody"></tbody>
      </table>
      <div class="add-row">
        <input class="geo-add" id="addGeo" placeholder="GEO">
        <input class="num-add" id="addMin" placeholder="Min" type="number">
        <input class="num-add" id="addAvg" placeholder="Avg" type="number">
        <input class="num-add" id="addMax" placeholder="Max" type="number">
        <button class="btn btn-p btn-sm" onclick="addRate()">Добавить</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token='',currentDays=1,ratesCount=0;

function showToast(msg,ok){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(ok?'ok':'err');t.style.display='block';setTimeout(()=>t.style.display='none',2000)}

function showPage(name,el){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById('pg-'+name).classList.add('on');if(name==='rates')loadRates();if(name==='analytics')loadStats()}

async function doLogin(){
  const user=document.getElementById('loginUser').value,pass=document.getElementById('loginPass').value;
  try{const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:user,password:pass})});const d=await r.json();if(d.ok){token=d.token;document.getElementById('loginBox').style.display='none';document.getElementById('dashboard').style.display='block';loadStats()}else{document.getElementById('loginErr').style.display='block'}}catch(e){document.getElementById('loginErr').style.display='block'}
}

function setPeriod(d,el){currentDays=d;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');loadStats()}

async function loadStats(){
  try{const r=await fetch(`/api/admin/stats?days=${currentDays}&token=${token}`);const d=await r.json();if(!d.ok)return;const s=d.stats;
  document.getElementById('cards').innerHTML=`<div class="card"><div class="card-label">Пользователи</div><div class="card-val acc">${s.unique_users}</div><div class="card-sub">новых: ${s.new_users}</div></div><div class="card"><div class="card-label">Событий</div><div class="card-val">${s.total_events}</div></div><div class="card"><div class="card-label">API расходы</div><div class="card-val ${s.total_cost>1?'red':'grn'}">$${s.total_cost.toFixed(4)}</div></div><div class="card"><div class="card-label">Бот</div><div class="card-val">${s.by_source.bot||0}</div></div><div class="card"><div class="card-label">Сайт</div><div class="card-val">${s.by_source.web||0}</div></div>`;
  const em={start:'🚀',check:'🔗',addlink:'➕',analyze:'📊',lead:'📩',rates:'💰',web_check:'🌐'};
  document.getElementById('byType').innerHTML=Object.entries(s.by_type).map(([k,v])=>`<tr><td>${em[k]||'•'} ${k}</td><td>${v}</td></tr>`).join('');
  document.getElementById('topUsers').innerHTML=(s.top_users||[]).map(([u,c],i)=>`<tr><td>${i+1}. ${u}</td><td>${c}</td></tr>`).join('');
  const re=await fetch(`/api/admin/events?days=${currentDays}&token=${token}`);const ev=await re.json();
  if(ev.ok)document.getElementById('recentEvents').innerHTML=(ev.events||[]).map(e=>`<tr><td>${e.time}</td><td>${e.type}</td><td>${e.username||'—'}</td><td>${(e.details||'').substring(0,50)}</td></tr>`).join('');
  }catch(e){console.error(e)}
}

async function loadRates(){
  try{const r=await fetch(`/api/admin/rates?token=${token}`);const d=await r.json();if(!d.ok)return;
  ratesCount=d.rates.length;
  document.getElementById('ratesCountLabel').textContent=ratesCount;
  document.getElementById('ratesBody').innerHTML=d.rates.map(r=>`<tr id="rate-${r.id}"><td><input class="geo-input" value="${r.geo}" onchange="saveRate(${r.id},this.parentNode.parentNode)"></td><td><input value="${r.min}" type="number" onchange="saveRate(${r.id},this.parentNode.parentNode)"></td><td><input value="${r.avg}" type="number" onchange="saveRate(${r.id},this.parentNode.parentNode)"></td><td><input value="${r.max}" type="number" onchange="saveRate(${r.id},this.parentNode.parentNode)"></td><td><button class="btn btn-d btn-sm" onclick="deleteRate(${r.id})">✕</button></td></tr>`).join('');
  }catch(e){console.error(e)}
}

async function saveRate(id,row){
  const inputs=row.querySelectorAll('input');
  const data={token,geo:inputs[0].value,min:parseFloat(inputs[1].value),avg:parseFloat(inputs[2].value),max:parseFloat(inputs[3].value)};
  try{const r=await fetch(`/api/admin/rates/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const d=await r.json();
  if(d.ok){showToast('Сохранено',true)}else{showToast('Ошибка',false)}
  }catch(e){showToast('Ошибка',false)}
}

async function deleteRate(id){
  if(!confirm('Удалить ГЕО?'))return;
  try{const r=await fetch(`/api/admin/rates/${id}?token=${token}`,{method:'DELETE'});const d=await r.json();
  if(d.ok){document.getElementById('rate-'+id).remove();showToast('Удалено',true)}else{showToast('Ошибка',false)}
  }catch(e){showToast('Ошибка',false)}
}

async function addRate(){
  const geo=document.getElementById('addGeo').value.trim();
  const mn=parseFloat(document.getElementById('addMin').value);
  const avg=parseFloat(document.getElementById('addAvg').value);
  const mx=parseFloat(document.getElementById('addMax').value);
  if(!geo||isNaN(mn)||isNaN(avg)||isNaN(mx)){showToast('Заполни все поля',false);return}
  try{const r=await fetch('/api/admin/rates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,geo,min:mn,avg,max:mx})});const d=await r.json();
  if(d.ok){showToast('Добавлено',true);document.getElementById('addGeo').value='';document.getElementById('addMin').value='';document.getElementById('addAvg').value='';document.getElementById('addMax').value='';loadRates()}else{showToast('Ошибка',false)}
  }catch(e){showToast('Ошибка',false)}
}

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
