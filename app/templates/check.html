<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOhub — Проверка ссылки</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0c0c14;--bg3:#13131e;--bg4:#1a1a28;--border:#1e1e30;--bh:#2e2e48;--t:#e4e4f0;--t2:#8585a0;--t3:#4a4a64;--acc:#00e6b8;--acd:#00e6b818;--acg:#00e6b830;--red:#ff3f5e;--redd:#ff3f5e18;--ylw:#ffa630;--ylwd:#ffa63018;--grn:#3fcc7f;--grnd:#3fcc7f18;--blu:#3f8fff;--blud:#3f8fff18;--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.wrap{max-width:820px;margin:0 auto;padding:30px 16px}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
h1 span{color:var(--acc)}
.sub{color:var(--t2);font-size:13px;margin-bottom:24px;line-height:1.5}
.form-row{display:flex;gap:8px;margin-bottom:24px}
.form-row input{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--t);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none}
.form-row input:focus{border-color:var(--acc)}
.form-row input::placeholder{color:var(--t3)}
.btn-check{padding:12px 28px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn-check:hover{background:#00f5c8}
.btn-check:disabled{opacity:.5;cursor:not-allowed}

/* Loading */
.loader{display:none;text-align:center;padding:40px 0}
.loader.on{display:block}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{color:var(--t2);font-size:13px}

/* Results */
.results{display:none}
.results.on{display:block}

/* Summary bar */
.summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.sum-card{flex:1;min-width:120px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.sum-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sum-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}
.sum-ok{color:var(--grn)}.sum-warn{color:var(--ylw)}.sum-bad{color:var(--red)}

/* Chain visualization */
.chain{position:relative;padding:0 0 0 28px}
.step{position:relative;padding:0 0 24px 32px;border-left:2px solid var(--border)}
.step:last-child{border-left-color:transparent;padding-bottom:0}
.step-dot{position:absolute;left:-9px;top:2px;width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.step-dot.start{background:var(--acc);border-color:var(--acc)}
.step-dot.redirect{background:var(--ylw);border-color:var(--ylw)}
.step-dot.end{background:var(--grn);border-color:var(--grn)}
.step-dot.error{background:var(--red);border-color:var(--red)}
.step-code{position:absolute;left:-48px;top:2px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:32px;text-align:right}
.code-301,.code-302,.code-303,.code-307,.code-308{color:var(--ylw)}
.code-200{color:var(--grn)}
.code-403,.code-401,.code-406{color:var(--blu)}
.code-404,.code-500,.code-502,.code-503{color:var(--red)}
.step-url{font-family:'JetBrains Mono',monospace;font-size:12px;word-break:break-all;color:var(--t);line-height:1.5}
.step-domain{font-size:11px;color:var(--t2);margin-top:2px}
.step-domain b{color:var(--acc)}
.step-arrow{color:var(--t3);font-size:10px;margin-top:4px}

/* Issues & Info */
.findings{margin-top:20px}
.finding-section{margin-bottom:16px}
.finding-title{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.finding{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;margin-bottom:4px;line-height:1.5}
.finding.issue{border-color:var(--red);background:var(--redd)}
.finding.info{border-color:var(--grn);background:var(--grnd)}
.finding.warn{border-color:var(--ylw);background:var(--ylwd)}

/* Params table */
.params{margin-top:16px}
.params table{width:100%;border-collapse:collapse;font-size:12px}
.params th{text-align:left;padding:6px 8px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.params td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px}

/* Back link */
.back{display:inline-block;color:var(--acc);text-decoration:none;font-size:13px;margin-bottom:16px}
.back:hover{text-decoration:underline}

/* Bot link */
.bot-link{display:inline-block;margin-top:20px;padding:10px 24px;background:var(--acc);color:#000;border-radius:var(--rs);text-decoration:none;font-weight:600;font-size:13px}
.bot-link:hover{opacity:.85}

@media(max-width:600px){
  .form-row{flex-direction:column}
  .summary{flex-direction:column}
  .sum-card{min-width:auto}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← SEOhub</a>
  <h1>🔗 Проверка <span>реф.ссылки</span></h1>
  <p class="sub">Вставь ссылку — увидишь полную цепочку редиректов, потерянные параметры и проблемы. Как WhereGoes, но для гемблинга.</p>

  <div class="form-row">
    <input type="text" id="urlInput" placeholder="https://track.partner.com/click?sub_id=123&geo=DE" autofocus>
    <button class="btn-check" id="checkBtn" onclick="doCheck()">Проверить →</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text">Проверяю цепочку редиректов...</div>
  </div>

  <div class="results" id="results">
    <div class="summary" id="summary"></div>
    <div class="chain" id="chain"></div>
    <div class="findings" id="findings"></div>
    <div class="params" id="params"></div>
  </div>

  <a class="bot-link" href="https://t.me/seohubmainbot">Проверить в Telegram-боте →</a>
</div>

<script>
async function doCheck() {
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;

  const btn = document.getElementById('checkBtn');
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');

  btn.disabled = true;
  loader.classList.add('on');
  results.classList.remove('on');

  try {
    const resp = await fetch('/api/check-link?url=' + encodeURIComponent(url));
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    document.getElementById('summary').innerHTML =
      '<div class="sum-card"><div class="sum-label">Ошибка</div><div class="sum-val sum-bad">Не удалось проверить</div></div>';
    results.classList.add('on');
  } finally {
    btn.disabled = false;
    loader.classList.remove('on');
  }
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch { return url; }
}

function renderResults(data) {
  const chain = data.redirect_chain || [];
  const numRedirects = Math.max(0, chain.length - 1);
  const issues = data.issues || [];
  const info = data.info || [];
  const time = data.response_time_ms || 0;
  const status = data.status_code || 0;

  // Determine overall health
  let health = 'ok', healthText = 'Работает', healthClass = 'sum-ok';
  if (issues.some(i => i.includes('💀'))) { health = 'dead'; healthText = 'Мёртвая'; healthClass = 'sum-bad'; }
  else if (issues.some(i => i.includes('🚩'))) { health = 'suspicious'; healthText = 'Подозрительно'; healthClass = 'sum-warn'; }
  else if (issues.some(i => i.includes('⚠️'))) { health = 'warning'; healthText = 'Внимание'; healthClass = 'sum-warn'; }

  // Summary
  document.getElementById('summary').innerHTML = `
    <div class="sum-card">
      <div class="sum-label">Статус</div>
      <div class="sum-val ${healthClass}">${healthText}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">HTTP</div>
      <div class="sum-val" style="color:${status >= 200 && status < 400 ? 'var(--grn)' : status >= 400 ? 'var(--red)' : 'var(--ylw)'}">${status || '—'}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Редиректов</div>
      <div class="sum-val ${numRedirects > 5 ? 'sum-bad' : numRedirects > 3 ? 'sum-warn' : 'sum-ok'}">${numRedirects}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Скорость</div>
      <div class="sum-val ${time > 5000 ? 'sum-bad' : time > 3000 ? 'sum-warn' : 'sum-ok'}">${time}ms</div>
    </div>
  `;

  // Chain visualization
  let chainHtml = '';
  chain.forEach((url, i) => {
    const isFirst = i === 0;
    const isLast = i === chain.length - 1;
    const domain = getDomain(url);
    let dotClass = 'redirect';
    let code = '';

    if (isFirst) {
      dotClass = 'start';
      code = 'START';
    } else if (isLast) {
      dotClass = status >= 200 && status < 400 ? 'end' : status >= 400 ? 'error' : 'end';
      code = String(status);
    } else {
      code = '30x';
    }

    const prevDomain = i > 0 ? getDomain(chain[i-1]) : '';
    const domainChanged = prevDomain && prevDomain !== domain;

    chainHtml += `
      <div class="step">
        <div class="step-dot ${dotClass}"></div>
        <div class="step-code code-${code}">${code}</div>
        <div class="step-url">${escHtml(url)}</div>
        <div class="step-domain">${domainChanged ? '<b>↗ Домен изменился:</b> ' : ''}${domain}</div>
        ${!isLast ? '<div class="step-arrow">↓ редирект</div>' : ''}
      </div>
    `;
  });
  document.getElementById('chain').innerHTML = chainHtml;

  // Findings
  let findingsHtml = '';
  if (issues.length) {
    findingsHtml += '<div class="finding-section"><div class="finding-title">⚠️ Проблемы</div>';
    issues.forEach(i => {
      const cls = i.includes('🚩') || i.includes('💀') ? 'issue' : 'warn';
      findingsHtml += `<div class="finding ${cls}">${i}</div>`;
    });
    findingsHtml += '</div>';
  }
  if (info.length) {
    findingsHtml += '<div class="finding-section"><div class="finding-title">✅ Информация</div>';
    info.forEach(i => {
      findingsHtml += `<div class="finding info">${i}</div>`;
    });
    findingsHtml += '</div>';
  }
  document.getElementById('findings').innerHTML = findingsHtml;

  // Tracking params table
  const origUrl = data.original_url || '';
  const finalUrl = data.final_url || '';
  const origParams = extractParams(origUrl);
  const finalParams = extractParams(finalUrl);
  const trackerKeys = new Set([
    'sub_id','subid','sub1','sub2','sub3','sub4','sub5',
    'clickid','click_id','clid','aff_id','affiliate_id',
    'partner_id','pid','aid','ref','ref_id','refid',
    'btag','stag','mtag','tag','tracker','tracker_id',
    'mid','serial','creative_id','anid',
    'utm_source','utm_medium','utm_campaign','utm_content','utm_term','tsrc'
  ]);

  const allKeys = [...new Set([...Object.keys(origParams), ...Object.keys(finalParams)])];
  const trackingKeys = allKeys.filter(k => trackerKeys.has(k.toLowerCase()));

  if (trackingKeys.length > 0) {
    let paramsHtml = '<div class="finding-title" style="margin-top:16px">🏷 Трекинг-параметры</div><table><thead><tr><th>Параметр</th><th>Исходное</th><th>Финальное</th><th>Статус</th></tr></thead><tbody>';
    trackingKeys.forEach(key => {
      const orig = origParams[key] || '—';
      const final = finalParams[key] || '—';
      let status = '', color = '';
      if (orig === '—') { status = '➕ Добавлен'; color = 'var(--blu)'; }
      else if (final === '—') { status = '❌ Потерян'; color = 'var(--red)'; }
      else if (orig === final) { status = '✅ ОК'; color = 'var(--grn)'; }
      else { status = '⚠️ Изменён'; color = 'var(--ylw)'; }
      paramsHtml += `<tr><td style="color:var(--acc)">${escHtml(key)}</td><td>${escHtml(orig.substring(0,40))}</td><td>${escHtml(final.substring(0,40))}</td><td style="color:${color}">${status}</td></tr>`;
    });
    paramsHtml += '</tbody></table>';
    document.getElementById('params').innerHTML = paramsHtml;
  } else {
    document.getElementById('params').innerHTML = '';
  }

  document.getElementById('results').classList.add('on');
}

function extractParams(url) {
  try {
    const u = new URL(url);
    const params = {};
    u.searchParams.forEach((v, k) => { params[k] = v; });
    return params;
  } catch { return {}; }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Enter key
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCheck();
});

// Pre-fill from URL param
const urlParam = new URLSearchParams(window.location.search).get('url');
if (urlParam) {
  document.getElementById('urlInput').value = urlParam;
  doCheck();
}
</script>
</body>
</html>
