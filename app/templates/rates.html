<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOhub — Ставки CPA</title>
<style>
:root{--bg:#050508;--bg2:#0c0c14;--bg3:#13131e;--border:#1e1e30;--t:#e4e4f0;--t2:#8585a0;--t3:#4a4a64;--acc:#00e6b8;--grn:#3fcc7f;--ylw:#ffa630;--red:#ff3f5e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t)}
.wrap{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
.sub{color:var(--t2);font-size:13px;margin-bottom:20px}
.search{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t);font-size:14px;margin-bottom:16px;outline:none}
.search:focus{border-color:var(--acc)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg3)}
.mn{color:var(--grn)}.av{color:var(--ylw);font-weight:700}.mx{color:var(--red)}
.mono{font-family:'JetBrains Mono',monospace}
.bot-link{display:inline-block;margin-top:20px;padding:10px 24px;background:var(--acc);color:#000;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}
.bot-link:hover{opacity:.85}
.back{color:var(--acc);text-decoration:none;font-size:13px}
.back:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/">← SEOhub</a>
  <h1>CPA ставки по ГЕО</h1>
  <p class="sub">{{ total_geos }} ГЕО · мин → средняя → макс</p>

  <input class="search" placeholder="Поиск: DE, Германия..." oninput="filterTable(this.value)">

  <table>
    <thead><tr><th>ГЕО</th><th>Мин</th><th>Средняя</th><th>Макс</th></tr></thead>
    <tbody>
    {% for r in cpa_rates %}
    <tr data-geo="{{ r.geo|lower }}">
      <td><b>{{ r.geo }}</b></td>
      <td class="mn mono">${{ r.min|int }}</td>
      <td class="av mono">${{ r.avg|int }}</td>
      <td class="mx mono">${{ r.max|int }}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>

  <a class="bot-link" href="https://t.me/seohubmainbot">Открыть бот →</a>
</div>

<script>
function filterTable(q){
  q=q.toLowerCase();
  document.querySelectorAll('tbody tr').forEach(r=>{
    r.style.display=(r.dataset.geo||'').includes(q)?'':'none';
  });
}
</script>
</body>
</html>
